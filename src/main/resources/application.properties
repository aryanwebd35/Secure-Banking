spring.application.name=Banking-app
server.port=${PORT:8080}

# Configuring MYSQL Database — values come from environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/banking-app?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin@1234}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT Configurations — secret MUST be set via environment variable in production
app.jwt.secret=${APP_JWT_SECRET:local-dev-secret-change-in-production}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Gmail SMTP — credentials come from environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Admin Credentials — come from environment variables
app.admin.email=${APP_ADMIN_EMAIL:admin@bank.com}
app.admin.password=${APP_ADMIN_PASSWORD}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always